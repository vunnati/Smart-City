<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

<div class="wrapper">

    <div class="header">
        <div>
            <img th:src="@{/images/logo1.png}" alt="Logo" />
        </div>
    </div>

    <form id="login" th:object="${account}" th:action="@{/index}" method="post">
        <h1>Login</h1>
        <th:block th:if="${param.error}">
            <p class="text-center text-danger">Credentials incorrect</p>
        </th:block>
        <div class="input">
            <input type="text" name="username" placeholder="Username" required>
            <i class='bx bxs-user'></i>
        </div>
        <div class="input">
            <input type="password" name="password" placeholder="Password" required>
            <i class='bx bxs-lock-alt' ></i>
        </div>
        <div class="forgot">
            <label>
                <a href="#">Forgot Password?</a>
            </label>
        </div>

        <button type="submit" class="btn">Login</button>
    </form>
    <form th:action="@{/register}" th:method="get">
        <div class="register">
            <p>Don't have an account?
                <button type="submit" class="register-btn">Register</button></p>
        </div>
    </form>
</div>

</body>
</html>
